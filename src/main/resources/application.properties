spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Indicar a Spring Boot que lea las credenciales inyectadas por Clever Cloud
spring.datasource.url=jdbc:mysql://${MYSQL_ADDON_HOST}:${MYSQL_ADDON_PORT}/${MYSQL_ADDON_DB}
spring.datasource.username=${MYSQL_ADDON_USER}
spring.datasource.password=${MYSQL_ADDON_PASSWORD}

# Evitar que Spring Boot intente borrar o sobreescribir tus tablas creadas
spring.jpa.hibernate.ddl-auto=none

# (Opcional) Para ver las consultas SQL en la consola y detectar fallos
spring.jpa.show-sql=true
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1